{% comment %}
  通用活動報名表單。用法:
    {% include event-register-form.html batch=page.event_batch %}
  batch 必填(梯次 slug),POST 到 k-rider-api Worker 的 /register。
  沿用 blog 既有 .signup token,額外欄位樣式 scoped 在 .event-signup 內。
{% endcomment %}
<style>
  .event-signup { max-width: 34rem; margin: 3rem auto 0; text-align: left; }
  .event-signup h2 { font-size: 1.25rem; text-align: center; }
  .event-signup .section-lead { text-align: center; margin: 0.5rem auto 1.5rem; }
  .event-signup form { display: flex; flex-direction: column; gap: 0.75rem; }
  .event-signup input[type=text],
  .event-signup input[type=email],
  .event-signup textarea {
    width: 100%; padding: 0.65rem 1rem; border: 1px solid var(--border);
    border-radius: 8px; font-size: 1rem; font-family: inherit; background: var(--card); color: var(--fg);
  }
  .event-signup textarea { resize: vertical; min-height: 4.5rem; line-height: 1.6; }
  .event-signup button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 0.7rem 1.4rem; font-size: 1rem; cursor: pointer;
  }
  .event-signup button:hover { filter: brightness(1.1); }
  .event-signup button:disabled { opacity: 0.6; cursor: default; }
  .event-signup .msg { min-height: 1.5rem; font-size: 0.9rem; color: var(--accent); text-align: center; margin-top: 0.75rem; }
  .event-signup .hp { position: absolute; left: -9999px; }
  .event-meta { list-style: none; padding: 0; margin: 0 0 2rem; display: grid; gap: 0.5rem; }
  .event-meta li { display: flex; gap: 0.75rem; align-items: baseline; }
  .event-meta li span { flex: 0 0 3.5rem; color: var(--muted); font-size: 0.9rem; }
</style>
<div class="signup event-signup" id="register">
  <h2>報名這場</h2>
  <p class="section-lead">留下稱呼和 Email,名額有限,報名後我們會寄邀請連結給你。</p>
  <form data-register data-batch="{{ include.batch }}">
    <input type="text" name="name" placeholder="你的稱呼" aria-label="稱呼" maxlength="40" required>
    <input type="email" name="email" placeholder="you@example.com" aria-label="Email" required>
    <textarea name="note" placeholder="你想學貼圖做什麼?(可留空)" aria-label="你想學什麼" maxlength="500" rows="3"></textarea>
    <input type="text" name="company" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
    <button type="submit">送出報名</button>
  </form>
  <p class="msg" aria-live="polite"></p>
</div>
<script>
document.querySelectorAll('form[data-register]').forEach(function (f) {
  if (f.dataset.bound) return; f.dataset.bound = '1';
  f.addEventListener('submit', async function (e) {
    e.preventDefault();
    var msg = f.parentElement.querySelector('.msg');
    var btn = f.querySelector('button');
    var el = f.elements; // 用 elements 取值:表單有名為 name 的欄位,f.name 會被 HTMLFormElement.name 遮蔽
    if (!f.dataset.batch) { msg.textContent = '這場活動設定有誤,請稍後再試。'; return; }
    msg.textContent = '送出中…'; btn.disabled = true;
    try {
      var r = await fetch('https://k-rider-api.yazelinj303.workers.dev/register', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          name: el['name'].value, email: el['email'].value,
          note: el['note'].value, company: el['company'].value, batch: f.dataset.batch
        })
      });
      var d = await r.json();
      if (d.ok) {
        msg.textContent = d.already ? '你已經報名過這場了,我們會再和你聯絡。' : '報名成功,記得留意信箱的邀請連結。';
        if (!d.already) f.reset();
      } else {
        msg.textContent = '出了點問題,請確認欄位後再試一次。';
      }
    } catch (err) { msg.textContent = '網路怪怪的,稍後再試。'; }
    finally { btn.disabled = false; }
  });
});
</script>
